<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет кладовщика</title>
<link rel="icon" href="/logo.png">
<link rel="stylesheet" href="/style.css">
<style>
  body { background: #f7fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; color: #2d3748; }
  .container { max-width: 1720px; margin: 0 auto; padding: 24px 32px; }
  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; }
  .header h1 { margin: 0; font-size: 1.5rem; color: #2d3748; }
  .header .subtitle { color: #718096; font-size: 0.9rem; }
  .header .refresh { margin-left: auto; }
  .section-title { font-size: 1.2rem; color: #2d3748; margin: 0 0 16px 0; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }
  .section-title:not(:first-of-type) { margin-top: 36px; }
  .no-orders { text-align: center; color: #a0aec0; padding: 48px 20px; font-size: 1.1rem; background: white; border: 1px solid #e2e8f0; border-radius: 12px; }
  .action-btn { margin-right: 6px; }
  .sk-name { font-weight: 600; color: #2b6cb0; }
  .table-wrap table { min-width: 1100px; }
  .table-wrap table th, .table-wrap table td { padding: 10px 12px; white-space: nowrap; }
  .table-wrap table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .table-wrap table td { font-size: 0.9rem; }
  .badge { font-size: 0.78rem; padding: 3px 10px; }
  .col-time { white-space: nowrap; }
  .col-name { min-width: 100px; white-space: normal; word-break: break-word; }
  .col-phone { white-space: nowrap; }
  .col-account { white-space: normal; word-break: break-word; min-width: 80px; }
  .col-org { min-width: 140px; white-space: normal; word-break: break-word; }
  .col-actions { white-space: nowrap; min-width: 120px; }
  .btn-sm { font-size: 0.78rem; padding: 4px 10px; }

  @media (max-width: 1100px) {
    .container { padding: 16px; }
    .header { flex-wrap: wrap; }
    .header h1 { font-size: 1.2rem; }
    .table-wrap { overflow-x: auto; }
  }

  @media (min-width: 1600px) {
    .container { padding: 32px 40px; }
    .table-wrap table th, .table-wrap table td { padding: 12px 16px; }
    .table-wrap table td { font-size: 0.95rem; }
    .badge { font-size: 0.82rem; padding: 4px 12px; }
    .btn-sm { font-size: 0.82rem; padding: 5px 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="/logo.png" alt="" style="height:40px">
    <div>
      <h1>Кабинет кладовщика</h1>
      <div class="subtitle">Все активные заказы</div>
    </div>
    <button class="btn btn-secondary refresh" onclick="loadOrders()">Обновить</button>
  </div>

  <h2 class="section-title">Активные заказы</h2>
  <div id="activeOrders"><p class="no-orders">Загрузка...</p></div>

  <h2 class="section-title">Завершённые</h2>
  <div id="completedOrders"></div>
</div>

<div class="modal-overlay" id="actionPinModal">
  <div class="modal" style="max-width:360px">
    <h2 id="actionPinTitle" style="margin-top:0">Подтвердите действие</h2>
    <p style="color:#4a5568;margin:0 0 4px 0;font-size:0.9rem">Заказ назначен на:</p>
    <p id="actionPinStorekeeper" style="font-weight:700;color:#2b6cb0;margin:0 0 16px 0;font-size:1rem"></p>
    <p style="color:#718096;margin:0 0 20px 0;font-size:0.85rem">Введите пин-код этого кладовщика для подтверждения</p>
    <div class="form-group" style="margin-bottom:20px">
      <input type="password" id="actionPinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="0000" style="text-align:center;font-size:1.4rem;letter-spacing:8px;padding:12px;width:100%;box-sizing:border-box;border:2px solid #e2e8f0;border-radius:8px;outline:none">
    </div>
    <div id="actionPinError" style="color:#e53e3e;font-size:0.9rem;margin-bottom:12px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeActionPinModal()">Отмена</button>
      <button class="btn btn-primary" onclick="confirmActionPin()">Подтвердить</button>
    </div>
  </div>
</div>

<script>
  let actionData = { slotId: null, action: null };

  function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

  loadOrders();
  setInterval(loadOrders, 30000);

  async function loadOrders() {
    const activeEl = document.getElementById('activeOrders');
    const completedEl = document.getElementById('completedOrders');
    activeEl.innerHTML = '<p class="no-orders">Загрузка...</p>';
    completedEl.innerHTML = '';
    try {
      const res = await fetch('/api/storekeeper/slots');
      if (res.status === 403) {
        activeEl.innerHTML = '<p class="no-orders" style="color:#e53e3e">Доступ запрещён с этого IP</p>';
        return;
      }
      if (!res.ok) {
        activeEl.innerHTML = '<p class="no-orders">Ошибка загрузки</p>';
        return;
      }
      const data = await res.json();
      const active = Array.isArray(data && data.active) ? data.active : [];
      const completed = Array.isArray(data && data.completed) ? data.completed : [];
      renderOrders(active, completed);
    } catch {
      activeEl.innerHTML = '<p class="no-orders">Ошибка загрузки</p>';
    }
  }

  function renderOrders(active, completed) {
    const activeEl = document.getElementById('activeOrders');
    const completedEl = document.getElementById('completedOrders');

    if (!active.length) {
      activeEl.innerHTML = '<div class="no-orders">Нет активных заказов</div>';
    } else {
      let html = '<div class="table-wrap"><table><thead><tr>'
        + '<th>Дата</th><th>Время</th><th>Тип</th><th>Статус</th><th>Склад</th><th>Кладовщик</th>'
        + '<th>Клиент</th><th>Телефон</th><th>Счёт</th><th>Организация</th><th>На сборке</th><th class="col-actions">Действия</th>'
        + '</tr></thead><tbody>';
      for (const s of active) {
        const typeLabel = s.type === 'small' ? 'До 3 ед.' : 'Сборный';
        let statusText, statusBadge;
        if (s.assembling) { statusText = 'На сборке'; statusBadge = 'badge-assembling'; }
        else { statusText = 'У кладовщика'; statusBadge = 'badge-in-progress'; }

        const startTime = s.assembling_at;
        const elapsed = startTime ? formatElapsed(startTime) : '—';

        const skNameAttr = escapeHtml((s.storekeeper_name || '').replace(/'/g, "\\'"));
        let actions = '';
        if (s.assembling) {
          actions = `<button class="btn btn-primary btn-sm action-btn" onclick="openActionPin(${s.id}, 'complete', '${skNameAttr}')">Завершить</button>`
            + `<button class="btn btn-secondary btn-sm action-btn" onclick="openActionPin(${s.id}, 'return', '${skNameAttr}')">Вернуть</button>`;
        } else {
          actions = `<button class="btn btn-primary btn-sm action-btn" onclick="openActionPin(${s.id}, 'assemble', '${skNameAttr}')">Взять на сборку</button>`;
        }

        html += `<tr>
          <td class="col-time">${escapeHtml(s.date)}</td>
          <td class="col-time">${escapeHtml(s.time_start)}–${escapeHtml(s.time_end)}</td>
          <td><span class="badge ${s.type === 'small' ? 'badge-small' : 'badge-bulk'}">${typeLabel}</span></td>
          <td><span class="badge ${statusBadge}">${statusText}</span></td>
          <td>${s.warehouse_name ? escapeHtml(s.warehouse_name) : '—'}</td>
          <td class="sk-name">${s.storekeeper_name ? escapeHtml(s.storekeeper_name) : '—'}</td>
          <td class="col-name">${s.customer_name ? escapeHtml(s.customer_name) : '—'}</td>
          <td class="col-phone">${s.customer_phone ? escapeHtml(s.customer_phone) : '—'}</td>
          <td class="col-account">${s.customer_account ? s.customer_account.split('\n').map(a => a.trim()).filter(a => a).map(a => escapeHtml(a)).join('<br>') : '—'}</td>
          <td class="col-org">${s.customer_organization ? escapeHtml(s.customer_organization) : '—'}</td>
          <td class="col-time"><span class="timer" data-start="${escapeHtml(startTime || '')}">${elapsed}</span></td>
          <td class="col-actions">${actions}</td>
        </tr>`;
      }
      html += '</tbody></table></div>';
      activeEl.innerHTML = html;
    }

    if (!completed.length) {
      completedEl.innerHTML = '<div class="no-orders">Нет завершённых заказов</div>';
    } else {
      let html = '<div class="table-wrap"><table><thead><tr>'
        + '<th>Дата</th><th>Время</th><th>Тип</th><th>Склад</th><th>Кладовщик</th>'
        + '<th>Клиент</th><th>Телефон</th><th>Счёт</th><th>Организация</th><th>Выполнен за</th>'
        + '</tr></thead><tbody>';
      for (const s of completed) {
        const typeLabel = s.type === 'small' ? 'До 3 ед.' : 'Сборный';
        const startTime = s.assembling_at;
        const duration = startTime && s.completed_at ? formatDuration(startTime, s.completed_at) : '—';
        html += `<tr>
          <td class="col-time">${escapeHtml(s.date)}</td>
          <td class="col-time">${escapeHtml(s.time_start)}–${escapeHtml(s.time_end)}</td>
          <td><span class="badge ${s.type === 'small' ? 'badge-small' : 'badge-bulk'}">${typeLabel}</span></td>
          <td>${s.warehouse_name ? escapeHtml(s.warehouse_name) : '—'}</td>
          <td class="sk-name">${s.storekeeper_name ? escapeHtml(s.storekeeper_name) : '—'}</td>
          <td class="col-name">${s.customer_name ? escapeHtml(s.customer_name) : '—'}</td>
          <td class="col-phone">${s.customer_phone ? escapeHtml(s.customer_phone) : '—'}</td>
          <td class="col-account">${s.customer_account ? s.customer_account.split('\n').map(a => a.trim()).filter(a => a).map(a => escapeHtml(a)).join('<br>') : '—'}</td>
          <td class="col-org">${s.customer_organization ? escapeHtml(s.customer_organization) : '—'}</td>
          <td class="col-time">${duration}</td>
        </tr>`;
      }
      html += '</tbody></table></div>';
      completedEl.innerHTML = html;
    }
  }

  function formatElapsed(dateStr) {
    const diff = Date.now() - new Date(dateStr.replace(' ', 'T')).getTime();
    if (diff < 0) return '0 сек';
    return formatDiff(diff);
  }

  function formatDuration(from, to) {
    const diff = new Date(to.replace(' ', 'T')).getTime() - new Date(from.replace(' ', 'T')).getTime();
    if (diff < 0) return '—';
    return formatDiff(diff);
  }

  function formatDiff(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `${h} ч ${m} мин`;
    if (m > 0) return `${m} мин ${s} сек`;
    return `${s} сек`;
  }

  setInterval(() => {
    document.querySelectorAll('.timer[data-start]').forEach(el => {
      if (el.dataset.start) {
        el.textContent = formatElapsed(el.dataset.start);
      }
    });
  }, 1000);

  function openActionPin(slotId, action, storekeeperName) {
    actionData = { slotId, action };
    document.getElementById('actionPinTitle').textContent = action === 'assemble' ? 'Взять на сборку'
      : action === 'return' ? 'Вернуть со сборки' : 'Завершить заказ';
    document.getElementById('actionPinStorekeeper').textContent = storekeeperName || 'Неизвестно';
    document.getElementById('actionPinInput').value = '';
    document.getElementById('actionPinError').style.display = 'none';
    document.getElementById('actionPinModal').classList.add('open');
    setTimeout(() => document.getElementById('actionPinInput').focus(), 100);
  }

  function closeActionPinModal() {
    document.getElementById('actionPinModal').classList.remove('open');
    actionData = { slotId: null, action: null };
  }

  document.getElementById('actionPinInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmActionPin(); });

  async function confirmActionPin() {
    const pinCode = document.getElementById('actionPinInput').value.trim();
    const errEl = document.getElementById('actionPinError');
    errEl.style.display = 'none';
    if (!pinCode || !/^\d{4}$/.test(pinCode)) {
      errEl.textContent = 'Пин-код должен быть 4 цифры';
      errEl.style.display = 'block';
      return;
    }
    const { slotId, action } = actionData;
    let url;
    if (action === 'assemble') url = `/api/storekeeper/slots/${slotId}/assemble`;
    else if (action === 'return') url = `/api/storekeeper/slots/${slotId}/return-from-assembly`;
    else url = `/api/storekeeper/slots/${slotId}/complete`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pinCode })
      });
      const data = await res.json();
      if (!data.success) {
        errEl.textContent = data.error || 'Ошибка';
        errEl.style.display = 'block';
        return;
      }
      closeActionPinModal();
      loadOrders();
    } catch {
      errEl.textContent = 'Ошибка сети';
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
