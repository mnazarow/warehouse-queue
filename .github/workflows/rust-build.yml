name: Rust build

# Compiles and checks the Rust variant (rust-service) on GitHub's runners, which
# have a Rust toolchain, a C compiler (for rusqlite bundled) and network access.
# Use the Actions tab to see compile errors.

on:
  push:
    branches: [main]
    paths:
      - 'rust-service/**'
      - '.github/workflows/rust-build.yml'
  pull_request:
    paths:
      - 'rust-service/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-service
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-service/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-service/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Clippy (warnings only, non-blocking)
        run: cargo clippy --all-targets || true

      - name: Commit Cargo.lock if generated
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain Cargo.lock)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add Cargo.lock
            git commit -m "ci: update Cargo.lock" || true
            git push || true
          fi
